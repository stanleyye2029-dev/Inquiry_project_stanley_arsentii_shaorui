<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juicy BBQ</title>
  <link rel="icon" type="image/png" href="assets-stanley/pictures-stanley/Oak and Ember.png"/>

  <style>
    :root {
      --primary-brown: rgba(139, 69, 19, 0.95);
      --white: #ffffff;
      --shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: sandybrown;
      color: #222;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      box-shadow: var(--shadow);
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .branding {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .branding img {
      height: 60px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: inherit;
      font-weight: bold;
      transition: opacity 0.2s ease;
    }

    nav a:hover {
      opacity: 0.7;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .hero h1 {
      font-size: 3rem;
      color: var(--primary-brown);
      -webkit-text-stroke: 2px var(--white);
      text-shadow: 3px 3px 0 black, -3px 3px 0 black,
                   3px -3px 0 black, -3px -3px 0 black;
      margin-bottom: 2rem;
    }

    .hero-actions {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--white);
      color: var(--primary-brown);
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #f2f2f2;
    }

    .cross-sections {
      padding: 4rem 2rem;
      background: #fff3e0;
      text-align: center;
    }

    #food-catalog-cross-section {
      background-image: url("assets-stanley/pictures-stanley/download (2).jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      padding: 6rem 2rem;
      color: white;
    }

    #food-catalog-cross-section .btn {
      margin-top: 2rem;
      background: var(--primary-brown);
      color: var(--white);
    }

    #food-catalog-cross-section .btn:hover {
      background: #5c2f0c;
    }

    footer {
      text-align: center;
      padding: 0.5rem;
      background: var(--white);
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      nav ul {
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
      }

      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="branding">
      <img src="assets-stanley/pictures-stanley/Oak and Ember.png" alt="Oak and Ember logo">
      <img src="assets-stanley/pictures-stanley/images.png" alt="Juicy BBQ secondary logo">
    </div>

    <nav aria-label="Main navigation">
      <ul>
        <li><a href="#">Menu</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Order</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">Login</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <video src="assets-stanley/videos-stanley/pixelbin-video.mp4" autoplay muted loop playsinline></video>
      <h1>Hungry? You're in the right place.</h1>
      <div class="hero-actions">
        <a href="#" class="btn">Order Now</a>
        <a href="#" class="btn">View Menu</a>
      </div>
    </section>

    <section class="cross-sections">
      <div id="food-catalog-cross-section">
        <h2>Scroll Through The Food Catalog</h2>
        <a href="#" class="btn">Check It Out</a>
      </div>
    </section>
  </main>

  <footer>
    <p>Background video courtesy of Pixelbin</p>
    <p>Food Catalog Cross-section Background Image from NYT Cooking</p>
  </footer>

</body>
</html>
